<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIO - Вход</title>
  <link rel="stylesheet" href="style.css?v=2">
  <style>
    body.login-bg { margin: 0; padding: 0; }
    .login-card .form-item { margin-bottom: 0; }
    .login-card .form-item label { color: #a78bfa; font-size: 0.85rem; margin-bottom: 6px; display: block; }
    .login-card .form-item small { display: block; margin-top: -8px; margin-bottom: 12px; }
    #message { border-radius: 12px; padding: 12px; text-align: center; font-size: 0.9rem; }
    @keyframes fireFlicker {
      0%, 100% { text-shadow: 0 0 10px rgba(139,92,246,0.5); }
      50% { text-shadow: 0 0 20px rgba(139,92,246,0.8), 0 0 40px rgba(99,102,241,0.3); }
    }
    .login-card h1 { animation: fireFlicker 3s ease-in-out infinite; }
  </style>
</head>
<body class="login-bg">
  <div class="container" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <main class="card login-card">
      <h1>🔥 DIO</h1>
      <p class="subtitle">Современный мессенджер. Общайся со своей аудиторией.</p>

      <div class="form-item">
        <label for="username">@username</label>
        <input id="username" class="login-input" type="text" placeholder="my_name" autocomplete="username" maxlength="32" spellcheck="false">
        <small style="color: #a5b4fc; font-size: 0.8rem;">Только a-z, 0-9 и _, минимум 5 символов</small>
      </div>
      <div class="form-item">
        <label for="password">Пароль</label>
        <input id="password" class="login-input" type="password" placeholder="Введите пароль" autocomplete="current-password">
      </div>

      <div id="message" class="alert hidden"></div>

      <div class="form-actions login-actions" style="margin-top: 16px;">
        <button id="btn-login" class="login-btn login-btn-primary">Войти</button>
        <button id="btn-register" class="login-btn login-btn-secondary">Регистрация</button>
      </div>
    </main>
  </div>
  <script>
    const usernameInput = document.querySelector('#username');
    const passwordInput = document.querySelector('#password');
    const btnLogin = document.querySelector('#btn-login');
    const btnRegister = document.querySelector('#btn-register');
    const messageEl = document.querySelector('#message');

    function showMessage(text, isError = true) {
      messageEl.textContent = text;
      messageEl.classList.toggle('hidden', !text);
      messageEl.style.backgroundColor = isError ? 'rgba(220, 38, 38, .12)' : 'rgba(34,197,94, .14)';
      messageEl.style.color = isError ? '#fee2e2' : '#dcfce7';
    }

    async function request(path, body) {
      const response = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const json = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(json.message || 'Ошибка');
      return json;
    }

    const USERNAME_REGEX = /^[a-z0-9_]{5,32}$/;

    async function submit(path) {
      try {
        const username = usernameInput.value.trim().toLowerCase();
        const password = passwordInput.value.trim();
        if (path === '/api/register' && !USERNAME_REGEX.test(username)) {
          throw new Error('Username: только a-z, 0-9 и _, минимум 5 символов');
        }
        const body = { username, password };
        const result = await request(path, body);
        // Save token to localStorage
        if (result.token) {
          localStorage.setItem('dio_token', result.token);
          localStorage.setItem('dio_username', result.username);
        }
        showMessage(result.message, false);
        setTimeout(() => window.location.href = '/', 600);
      } catch (error) {
        showMessage(error.message || 'Ошибка сети');
      }
    }

    btnLogin.addEventListener('click', () => submit('/api/login'));
    btnRegister.addEventListener('click', () => submit('/api/register'));
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') submit('/api/login'); });
    usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') submit('/api/login'); });
  </script>
</body>
</html>
