<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIO - Messenger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-app="true">
  <div class="container">
    <header class="header card">
      <div class="logo"><span></span>DIO</div>
      <nav class="navbar">
        <button id="nav-feed" class="active" data-i18n="nav_feed">🏠 Главная</button>
        <button id="nav-messages" data-i18n="nav_messages">💬 Сообщения</button>
        <button id="nav-stand">🎬 Stand</button>
        <button id="nav-search" data-i18n="nav_search">🔎 Поиск</button>
        <button id="nav-profile" data-i18n="nav_profile">👤 Профиль</button>
        <button id="nav-settings" data-i18n="nav_settings">⚙️ Настройки</button>
      </nav>
      <button id="btn-logout" class="btn-primary">Выйти</button>
    </header>

    <section class="hero card section">
      <div class="section-title">
        <h1 id="page-title">Лента</h1>
      </div>
      <p id="api-status">Загрузка...</p>
    </section>

    <div class="grid grid-3">
      <main class="card section page-section" data-section="feed">
        <div id="new-post-form" class="new-post-card">
          <input id="post-text" type="text" placeholder="Что на уме?" maxlength="300">
          <div id="post-media-preview" class="media-preview hidden"></div>
          <div class="post-form-actions">
            <button type="button" id="post-emoji-toggle" class="btn-emoji" title="Эмодзи">😊</button>
            <div id="post-emoji-panel" class="emoji-panel hidden"></div>
            <label class="file-upload">
              <span>Фото / Видео</span>
              <input id="post-file" type="file" accept="image/*,video/*">
            </label>
            <button id="btn-post-create" class="btn-primary">Опубликовать</button>
          </div>
        </div>
        <div id="feed" class="grid"></div>
      </main>

      <aside class="card section page-section hidden" data-section="messages">
        <div class="section-title">
          <h2 data-i18n="title_messages">Сообщения</h2>
          <button type="button" id="btn-new-group" class="btn-primary btn-sm">+ Группа/канал</button>
        </div>
        <div id="contacts-list" class="contacts-list"></div>
        <div id="chat-area" class="chat-area hidden">
          <button id="back-to-contacts" class="btn-back">← Назад</button>
          <div id="chat-header" class="chat-header"></div>
          <div id="chat-messages" class="chat-messages"></div>
          <div id="chat-media-preview" class="chat-media-preview hidden"></div>
          <div class="chat-input">
            <button type="button" id="msg-emoji-toggle" class="btn-emoji">😊</button>
            <div id="msg-emoji-panel" class="emoji-panel hidden"></div>
            <button type="button" id="btn-media-upload" class="btn-emoji" title="Прикрепить фото/видео">📎</button>
            <button type="button" id="btn-voice-record" class="btn-emoji" title="Голосовое сообщение">🎤</button>
            <button type="button" id="btn-video-record" class="btn-emoji" title="Видеосообщение">📹</button>
            <input id="message-text" type="text" placeholder="Написать сообщение...">
            <button id="btn-send-message" class="btn-primary">Отправить</button>
          </div>
        </div>
      </aside>

      <section class="card section page-section hidden stand-section" data-section="stand">
        <div id="stand-feed" class="stand-feed"></div>
        <button type="button" id="stand-fab" class="stand-fab" aria-label="Загрузить видео">+</button>
      </section>

      <aside class="card section page-section hidden" data-section="search">
        <div class="section-title"><h2>Поиск людей</h2></div>
        <div class="search-users">
          <div class="search-bar-row">
            <input id="search-users" type="text" placeholder="Поиск по @username..." maxlength="32" autocomplete="off" spellcheck="false">
            <button type="button" id="btn-search-exact" class="btn-primary btn-sm">Найти</button>
          </div>
          <div id="search-results" class="search-results hidden"></div>
        </div>
        <div id="search-people" class="contacts-list"></div>
      </aside>

      <aside class="card section page-section hidden" data-section="profile">
        <div id="profile"></div>
      </aside>

      <aside class="card section page-section hidden" data-section="settings">
        <div class="settings-layout">
          <nav class="settings-nav" id="settings-nav">
            <button type="button" class="settings-nav-btn active" data-settings-panel="notifications">🔔 <span data-i18n="settings_notifications">Уведомления и звук</span></button>
            <button type="button" class="settings-nav-btn" data-settings-panel="privacy">🔒 <span data-i18n="settings_privacy">Конфиденциальность</span></button>
            <button type="button" class="settings-nav-btn" data-settings-panel="data">💾 <span data-i18n="settings_data">Данные и память</span></button>
            <button type="button" class="settings-nav-btn" data-settings-panel="appearance">🎨 <span data-i18n="settings_appearance">Внешний вид</span></button>
            <button type="button" class="settings-nav-btn" data-settings-panel="account">👤 <span data-i18n="settings_account">Аккаунт</span></button>
          </nav>
          <div class="settings-panels" id="settings-panels"></div>
        </div>
      </aside>
    </div>
  </div>

  <div id="user-profile-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-card card">
      <button type="button" class="modal-close" data-close-modal aria-label="Закрыть">×</button>
      <div id="user-profile-content"></div>
    </div>
  </div>

  <div id="group-modal" class="modal hidden">
    <div class="modal-backdrop" data-close-group-modal></div>
    <div class="modal-card card">
      <button type="button" class="modal-close" data-close-group-modal>×</button>
      <h3>Создать группу или канал</h3>
      <input id="group-title" type="text" placeholder="Название" maxlength="80">
      <select id="group-type">
        <option value="group">Группа (все пишут)</option>
        <option value="channel">Канал (пишут админы)</option>
      </select>
      <input id="group-slug" type="text" placeholder="slug (необязательно)" maxlength="32">
      <button type="button" id="btn-group-create" class="btn-primary">Создать</button>
    </div>
  </div>

  <!-- Универсальный предпросмотр медиа (для поста / stand / записи аудио-видео) -->
  <div id="media-preview-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close-media-preview></div>
    <div class="modal-card card media-preview-card">
      <button type="button" class="modal-close" data-close-media-preview aria-label="Закрыть">×</button>
      <h3 id="media-preview-title">Предпросмотр</h3>
      <div id="media-preview-content" class="media-preview-content"></div>
      <textarea id="media-preview-caption" class="media-preview-caption hidden" placeholder="Подпись..." maxlength="300"></textarea>
      <div class="media-preview-actions">
        <button type="button" class="btn-primary" data-close-media-preview>Отмена</button>
        <button type="button" class="btn-primary" id="btn-media-preview-confirm">Готово</button>
      </div>
    </div>
  </div>

  <!-- Нижняя навигация для мобильных -->
  <nav class="bottom-nav">
    <button id="bnav-feed" class="bnav-btn active" data-i18n="nav_feed">🏠<span>Главная</span></button>
    <button id="bnav-messages" class="bnav-btn" data-i18n="nav_messages">💬<span>Чаты</span></button>
    <button id="bnav-stand" class="bnav-btn">🎬<span>Stand</span></button>
    <button id="bnav-search" class="bnav-btn" data-i18n="nav_search">🔎<span>Поиск</span></button>
    <button id="bnav-profile" class="bnav-btn" data-i18n="nav_profile">👤<span>Профиль</span></button>
  </nav>

  <script src="i18n.js"></script>
  <script src="emojis.js"></script>
  <script src="app.js"></script>
  <script src="stand.js"></script>
</body>
</html>
